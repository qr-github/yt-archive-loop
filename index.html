<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>YouTube 複数動画ループ再生</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        .video-unit { border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; border-radius: 5px; background: #f9f9f9; }
        .remove-btn { color: red; cursor: pointer; float: right; }
    </style>
</head>
<body>

    <h2>再生リスト設定</h2>
    <div id="videoUnits">
        <div class="video-unit" id="unit0">
            <span class="remove-btn" onclick="removeUnit('unit0')">✕ 削除</span>
            <div>動画URL: <input type="text" class="v-url" style="width:400px" placeholder="https://www.youtube.com/watch?v=XXXXXXXXXXX"></div>
            <div style="margin-top:5px;">
                ループ区間（st,end 秒で1行ずつ）:<br>
                <textarea class="v-sections" rows="3" cols="60" placeholder="30,50"></textarea>
            </div>
        </div>
    </div>

    <button onclick="addUnit()">動画を追加</button>
    <button onclick="saveConfig()">↑ 設定を保存</button>
    <button onclick="document.getElementById('loadFile').click()">↓ 設定を読込</button>
    <input type="file" id="loadFile" style="display:none" accept=".json" onchange="loadConfig(event)">
    <br><br>

    <label><input type="checkbox" id="playAll" checked> 全区間を順番にループ再生</label><br>
    <button onclick="start()" style="padding: 10px 20px; background: #2196F3; color: white; border: none; border-radius: 5px; cursor: pointer;">再生開始</button>

    <hr>
    <div id="player"></div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player = null;
        let apiReady = false;
        let allSections = []; // {videoId, start, end} のフラットな配列にする
        let currentIndex = 0;
        let intervalId = null;

        function onYouTubeIframeAPIReady() { apiReady = true; }

        // 入力枠の追加
        function addUnit(url = "", sections = "") {
        const id = "unit" + Date.now() + Math.random().toString(36).substring(2,9);
        const html = `
            <div class="video-unit" id="${id}">
                <span class="remove-btn" onclick="removeUnit('${id}')">✕ 削除</span>
                <div>動画URL: <input type="text" class="v-url" style="width:400px" value="${url}"></div>
                <div style="margin-top:5px;">
                    ループ区間:<br>
                    <textarea class="v-sections" rows="3" cols="60">${sections}</textarea>
                </div>
            </div>`;
        document.getElementById("videoUnits").insertAdjacentHTML('beforeend', html);
}

        function removeUnit(id) {
            if(document.querySelectorAll('.video-unit').length > 1) {
                document.getElementById(id).remove();
            }
        }

        function extractVideoId(url){
            const patterns = [/v=([^&]+)/, /youtu\.be\/([^?&]+)/, /\/live\/([^?&]+)/, /\/embed\/([^?&]+)/];
            for(const p of patterns){
                const m = url.match(p);
                if(m && m[1]) return m[1];
            }
            return null;
        }

        function start(){
            allSections = [];
            const units = document.querySelectorAll('.video-unit');

            units.forEach(unit => {
                const url = unit.querySelector('.v-url').value.trim();
                const vId = extractVideoId(url);
                if(!vId) return;

                const lines = unit.querySelector('.v-sections').value.trim().split("\n");
                lines.forEach(line => {
                    const [s, e] = line.split(",").map(Number);
                    if(!isNaN(s) && !isNaN(e) && e > s) {
                        allSections.push({ videoId: vId, start: s, end: e });
                    }
                });
            });

            if(!allSections.length) {
                alert("有効な動画URLと区間を入力してください");
                return;
            }

            currentIndex = 0;
            const first = allSections[currentIndex];

            if(player) {
                player.loadVideoById({ videoId: first.videoId, startSeconds: first.start });
            } else {
                if(!apiReady) return alert("API準備中...");
                player = new YT.Player("player", {
                    videoId: first.videoId,
                    playerVars: { autoplay: 1, controls: 1 },
                    events: { onReady: () => { 
                        player.seekTo(first.start, true);
                        if(intervalId) clearInterval(intervalId);
                        intervalId = setInterval(checkLoop, 200);
                    }}
                });
            }
        }

        function checkLoop(){
            if(!player || !allSections.length) return;
            if(player.getPlayerState() !== YT.PlayerState.PLAYING) return;

            const s = allSections[currentIndex];
            const t = player.getCurrentTime();

            if(t >= s.end){
                const oldId = s.videoId;
                if(document.getElementById("playAll").checked) {
                    currentIndex = (currentIndex + 1) % allSections.length;
                }
                const next = allSections[currentIndex];

                if(next.videoId === oldId) {
                    player.seekTo(next.start, true);
                } else {
                    player.loadVideoById({ videoId: next.videoId, startSeconds: next.start });
                }
            }
        }

            // 設定をJSONとしてダウンロード
    function saveConfig() {
        const data = [];
        document.querySelectorAll('.video-unit').forEach(unit => {
            const url = unit.querySelector('.v-url').value.trim();
            const sections = unit.querySelector('.v-sections').value.trim();

            if(!url && !sections){
                //showStatues("空のフォームがあります");
                return;
            }
            data.push({
                url: url,
                sections: sections
            });

            if(data.length > 0){
                const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `yt_loop_config.json`;
                a.click();
            }else{
                showStatues("保存できる入力がありません");
            }
        });
    }

    // ファイルを読み込んで入力欄を再生成
    function loadConfig(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const data = JSON.parse(e.target.result);
                if (!Array.isArray(data)) return;
                document.getElementById("videoUnits").innerHTML = ""; // 既存の入力を全削除
                data.forEach(item => addUnit(item.url, item.sections)); // 保存データ分だけ作成
            } catch (err) {
                alert("ファイルの読み込みに失敗しました");
            }
        };
        reader.readAsText(file);
}
    </script>

    <h2>hh:mm:ssを秒に変換するツール</h2>
        <div id="toast" style="display:none; position:fixed; top:20px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.8); color:#F7F7F7; padding:10px 20px; border-radius:5px; z-index:9999;"></div>
        <input id="timeInput" type="text" placeholder="hh:mm:ss または mm:ss">
        <button onclick="convertToSeconds()">変更</button>
        <br>
        <span id="converted">0 秒</span>
        <button onclick="copySeconds()">コピー</button>

        <script>
            function convertToSeconds(){
                const input = document.getElementById("timeInput").value.trim();
                const parts = input.split(":").map(Number);
                if(parts.some(isNaN) || (parts.length !== 2 && parts.length !== 3)){
                    document.getElementById("converted").innerText = "形式が正しくありません"; return; }
                    let total = 0;
                    if(parts.length === 2){
                        //mm:ss
                        total = parts[0]*60 + parts[1];
                    }else if(parts.length === 3){
                        //hh:mm:ss
                        total = parts[0]*3600 + parts[1]*60 + parts[2];
                    }
                    document.getElementById("converted").innerText = total + " 秒";
                    }

                    //変換結果をコピー
                    function copySeconds(){
                        const text = document.getElementById("converted").innerText.replace(" 秒","");
                        navigator.clipboard.writeText(text).then(()=>{
                            showStatues(text + " copied");
                        }).catch(()=>{
                            alert("failed!");
                        });
                    }

                    function showStatues(message){
                        const toast = document.getElementById("toast");
                        toast.innerText = message;
                        toast.style.display = "block";

                        setTimeout(()=>{
                            toast.style.display = "none";
                        }, 1000);
                    }
            </script>
            <hr style="color: gray">

            <h2>サイト内クリップボード</h2>

            <textarea
                id="siteClipboard"
                rows="6"
                cols="80"
                placeholder="ここに一時保存したいテキストを書いてください"
            ></textarea>
            <br>

            <button onclick="copySiteClipboard()">コピー</button>
            <span id="copyStatus"></span>

            <script>
                function copySiteClipboard(){
                    const textarea = document.getElementById("siteClipboard");
                    const status = document.getElementById("copyStatus");

                    if(!textarea.value){
                        status.innerText = "コピーする内容がありません";
                        return;
                    }

                    navigator.clipboard.writeText(textarea.value)
                        .then(() => {
                            status.innerText = "コピーしました";
                            setTimeout(() => status.innerText = "", 1500);
                        })
                        .catch(() => {
                            status.innerText = "コピーに失敗しました";
                        });
                }
            </script>
</body>
</html>
